<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug — React Test</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body style="background:#0a0b0e;color:#e4e7f1;font-family:monospace;padding:2rem">
<h1>React Loading Test</h1>
<div id="status">Checking...</div>
<div id="root"></div>

<script>
(function() {
  var status = document.getElementById('status');
  
  function log(msg) {
    var div = document.createElement('div');
    div.textContent = msg;
    status.appendChild(div);
  }
  
  log('Script tag executed');
  log('typeof React: ' + typeof React);
  log('typeof ReactDOM: ' + typeof ReactDOM);
  
  if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
    log('React loaded OK — rendering...');
    try {
      var App = function() {
        var s = React.useState('Hello from React 18!');
        var state = s[0];
        return React.createElement('h2', {style: {color: '#10b981'}}, state);
      };
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      status.innerHTML = '<div style="color:#10b981;font-size:24px">✅ React is working!</div>' + status.innerHTML;
    } catch(e) {
      log('RENDER ERROR: ' + e.message);
      log(e.stack);
    }
  } else {
    log('❌ React/ReactDOM not loaded — CDN issue');
    
    // Try fetching the CDN URLs
    fetch('https://unpkg.com/react@18/umd/react.production.min.js')
      .then(r => { log('React CDN: ' + r.status); return r.text(); })
      .then(t => { log('React CDN length: ' + t.length); })
      .catch(e => { log('React CDN fetch failed: ' + e.message); });
      
    fetch('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js')
      .then(r => { log('ReactDOM CDN: ' + r.status); return r.text(); })
      .then(t => { log('ReactDOM CDN length: ' + t.length); })
      .catch(e => { log('ReactDOM CDN fetch failed: ' + e.message); });
  }
})();
</script>
</body>
</html>
